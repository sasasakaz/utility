<!DOCTYPE html>
<html lang="ja">
<!-- 
MarkdownをHTMLに変換するツール
Created: 2026-04-25
Updated: 2026-05-12
Description: MarkdownをHTMLに変換する。HTMLソースをコピぺして使う。
Notes: プレビュー用のHTMLとCSSは、下部のテキストエリアで自由に編集可能。hilight.js利用時はペースト先のHTMLにhighlight.jsとCSSの追加が必要。
-->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown to HTML</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="../common.css">
  <style>
    body {
      font-size: 0.9rem;
    }

    h2 {
      margin-top: 0;
    }

    /* メインの左右配置 */
    .main-container {
      display: flex;
      gap: 1.25rem;
      /* 上揃え */
      align-items: flex-start;
    }

    .editor-section {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* テキストエリア共通 */
    textarea,
    .output {
      width: 100%;
      padding: 1rem;
      border: 1px solid #ccc;
      border-radius: 0.5rem;
      background: white;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 0.9rem;
      overflow-y: auto;
    }

    /* 入力と出力の高さを固定 */
    #markdown-input,
    #html-output {
      height: 70vh;
    }

    #html-output {
      white-space: pre-wrap;
    }

    /* 下部コントロール（ボタン類） */
    .bottom-controls {
      margin-top: 0.5rem;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 0.5rem;
    }

    /* 左側の設定エリア */
    .settings-wrapper {
      display: flex;
      flex-direction: column;
      /* 設定エリア同士の間隔 */
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    /* 設定エリア（左下） */
    .settings-area {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .settings-area label {
      font-size: 0.9rem;
      font-weight: bold;
      color: #666;
    }

    .settings-area textarea {
      height: 80px;
      background: #fafafa;
    }

    /* 共通ボタン・タグ */
    .controls {
      margin-bottom: 0.5rem;
      display: flex;
      /* ボタン同士のすき間を少しキュッと詰める */
      gap: 0.5rem;
      /* 万が一画面からはみ出た時用の保険 */
      flex-wrap: wrap;
      align-items: center;
    }

    .controls button {
      width: 3.5rem;
      /* 内側の余白をなくして絵文字を真ん中に */
      padding: 0;
      font-size: 1rem;
    }

    .copy-msg {
      color: #4caf50;
      font-weight: bold;
      font-size: 0.9rem;
      min-width: 120px;
    }

    button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.25rem;
      font-weight: bold;
      font-size: 0.8rem;
    }

    /* 共通のボタンスタイル */
    .btn-tag {
      background: #fff;
      border: 1px solid #ddd;
      color: #555;
      /* 左側に少し太めの線を入れて、色分けの目印にする */
      border-left-width: 0.25rem;
    }

    /* Markdown形式のボタン（控えめなグレー） */
    .btn-md {
      border-left-color: #ccc;
    }

    /* HTML形式のボタン（鮮やかなブルー） */
    .btn-html {
      border-left-color: #0288d1;
    }

    .btn-tag:hover {
      background: #f8f8f8;
    }

    .btn-copy {
      background: #f57c00;
      color: white;
    }

    .btn-preview {
      background: #0288d1;
      color: white;
    }

    button:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <h2>MarkdownをHTMLに変換するにゃん</h2>
  <div class="controls">
    <button class="btn-tag btn-md" onclick="insertTag('h2')" title="見出し H2">#</button>
    <button class="btn-tag btn-md" onclick="insertTag('ul')" title="箇条書きリスト (•)">•</button>
    <button class="btn-tag btn-md" onclick="insertTag('ol')" title="番号付きリスト (1.)">1.</button>
    <button class="btn-tag btn-md" onclick="changeIndent('add')" title="インデントを増やす（スペース4個追加）">➡️</button>
    <button class="btn-tag btn-md" onclick="changeIndent('remove')" title="インデントを減らす（スペース4個削除）">⬅️</button>
    <button class="btn-tag btn-md" onclick="insertTag('strong')" title="強調 (🅱️)">🅱️</button>
    <button class="btn-tag btn-md" onclick="insertTag('link')" title="リンク挿入 (🔗)">🔗</button>
    <button class="btn-tag btn-md" onclick="insertTag('quote')" title="引用 (❝)">❝</button>
    <button class="btn-tag btn-md" onclick="insertTag('table')" title="表の挿入 (tsvなら範囲指定して押下)">📊</button>
    <button class="btn-tag btn-md" onclick="insertTag('inline_code')" title="インラインコード (🏷️)">🏷️</button>
    <button class="btn-tag btn-md" onclick="insertTag('code')" title="コードブロック (🧱)">🧱</button>
    <button class="btn-tag btn-md" onclick="insertTag('pre_quote')" title="等幅フォント改行維持引用：コード出力結果の貼付用などに (📋)">📋</button>
    <!-- <span style="margin: 0 2px; border-left: 1px solid #ccc; height: 1.5rem; align-self: center;"></span> -->
    <button class="btn-tag btn-html" onclick="insertTag('mark')" title="ハイライト (🖍️)">🖍️</button>
    <button class="btn-tag btn-html" onclick="insertTag('info')" title="情報ボックス (✅)">✅</button>
    <button class="btn-tag btn-html" onclick="insertTag('warn')" title="注意ボックス (⚠️)">⚠️</button>
    <button class="btn-tag btn-html" onclick="insertTag('alert')" title="警告ボックス (🚫)">🚫</button>
    <button class="btn-tag btn-html" onclick="insertTag('br_hr')" title="改行＆区切り線 (➖)">➖</button>
  </div>

  <div class="main-container">
    <!-- 左側：入力と設定 -->
    <div class="editor-section">
      <textarea id="markdown-input" placeholder="Input Markdown..."></textarea>

      <div class="settings-wrapper">
        <div class="settings-area">
          <label>Preview画面に適用するCSS</label>
          <textarea id="css-input"></textarea>
        </div>

        <div class="settings-area">
          <label>Preview画面に適用するHTML {{content}}部分に変換結果が入る</label>
          <textarea id="wrapper-input"></textarea>
        </div>
      </div>
    </div>

    <!-- 右側：出力とボタン -->
    <div class="editor-section">
      <div id="html-output" class="output"></div>
      <div class="bottom-controls">
        <button class="btn-preview" onclick="openPreview()">Preview HTML</button>
        <button class="btn-copy" onclick="copyToClipboard()">Copy HTML source</button>
        <span id="copy-message" class="copy-msg" style="display: none;">コピーしたにゃん！</span>
      </div>
    </div>
  </div>

  <script>
    const defaultCSS = `body { font-family: sans-serif; line-height: 1.6; padding: 2.5rem; max-width: 768px; margin: auto; background: white; color: #333; }
blockquote { border-left: 0.25rem solid #ccc; margin: 1.5rem 1.25rem; padding: 0.5rem 1.25rem; color: #666; background-color: #f9f9f9; }
mark { background-color: #fff176; }
:not(pre) > code { background-color: #f0f0f0; color: #c7254e; padding: 0.125rem 0.25rem; border-radius: 0.25rem; font-family: monospace; font-size: 90%; }
.mdc-info-box { background-color: #e8f5e9; border-left: 0.25rem solid #4caf50; padding: 1rem; margin: 0.75rem 0; border-radius: 0.5rem; }
.mdc-warn-box { background-color: #fff3e0; border-left: 0.25rem solid #ff9800; padding: 1rem; margin: 0.75rem 0; border-radius: 0.5rem; }
.mdc-alert-box { background-color: #ffebee; border-left: 0.25rem solid #f44336; padding: 1rem; margin: 0.75rem 0; border-radius: 0.5rem; }`;

    const defaultWrapper = `<!DOCTYPE html>
<html>
<head>
    <title>HTML Preview</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"><\/script>
    <style>{{css}}</style>
</head>
<body>
    {{content}}
    <script>hljs.highlightAll();<\/script>
</body>
</html>`;

    const input = document.getElementById('markdown-input');
    const output = document.getElementById('html-output');
    const cssInput = document.getElementById('css-input');
    const wrapperInput = document.getElementById('wrapper-input');

    // 初期化
    cssInput.value = defaultCSS;
    wrapperInput.value = defaultWrapper;

    // リアルタイム更新
    input.addEventListener('input', updateOutput);
    function updateOutput() {
      // 右側にはHTMLソースを文字列として表示する
      output.textContent = marked.parse(input.value);
    }

    // ボタン押下時のタグ挿入関数
    function insertTag(type) {
      const start = input.selectionStart;
      const end = input.selectionEnd;
      const currentText = input.value;
      const selectedText = currentText.substring(start, end);

      let insertText = "";
      switch (type) {
        case 'table':
          if (selectedText.trim()) {
            // TSV（またはスペース区切り）をテーブルに変換するロジック
            const lines = selectedText.trim().split('\n');
            const rows = lines.map(line => line.split(/\t/)); // タブで分割

            if (rows.length > 0) {
              let tableMd = "";
              rows.forEach((cols, index) => {
                tableMd += '| ' + cols.join(' | ') + ' |\n';
                // 1行目の後にセパレーターを入れる
                if (index === 0) {
                  tableMd += '| ' + cols.map(() => '---').join(' | ') + ' |\n';
                }
              });
              insertText = tableMd;
            }
          } else {
            // 何も選択されていない時はデフォルトのテンプレート
            insertText = '| Header | Header | Header |\n| :--- | :--- | :--- |\n| Cell | Cell | Cell |\n| Cell | Cell | Cell |\n';
          }
          break;
        // --- 他のケース（strong, link等） ---
        case 'h2': insertText = '## ' + (selectedText); break;
        case 'ul': insertText = '- ' + (selectedText); break;
        case 'ol': insertText = '1. ' + (selectedText); break;
        case 'strong': insertText = '**' + (selectedText || '強調') + '**'; break;
        case 'link': insertText = '[' + (selectedText || 'テキスト') + '](https://google.com)'; break;
        case 'quote': insertText = '\n> ' + (selectedText || '引用文') + '\n'; break;
        // case 'table': insertText = '| Header | Header | Header |\n| :--- | :--- | :--- |\n| Cell | Cell | Cell |\n| Cell | Cell | Cell |\n'; break;
        case 'inline_code': insertText = '`' + (selectedText || 'code') + '`'; break;
        case 'code': insertText = '\n```\n' + (selectedText || '') + '\n```\n'; break;
        case 'pre_quote': insertText = '\n<blockquote><pre>\n' + (selectedText || 'ここにテキストをペースト') + '\n</pre></blockquote>\n'; break;
        case 'mark': insertText = '<mark>' + (selectedText || 'ハイライト') + '</mark>'; break;
        case 'info': insertText = '<div class="mdc-info-box">\n<strong>✅ 情報</strong>\n<ul>\n  <li>' + (selectedText || 'ないようを入力') + '</li>\n</ul>\n</div>\n'; break;
        case 'warn': insertText = '<div class="mdc-warn-box">\n<strong>⚠️ 注意</strong>\n<ul>\n  <li>' + (selectedText || 'ないようを入力') + '</li>\n</ul>\n</div>\n'; break;
        case 'alert': insertText = '<div class="mdc-alert-box">\n<strong>🚫 警告</strong>\n<ul>\n  <li>' + (selectedText || 'ないようを入力') + '</li>\n</ul>\n</div>\n'; break;
        case 'br_hr': insertText = '\n<br>\n<hr>\n<br>\n'; break;
      }

      // 選択範囲を新しい文字列で置き換える
      input.value = currentText.substring(0, start) + insertText + currentText.substring(end);
      // プレビュー更新
      updateOutput();
      // フォーカスを戻す
      input.focus();
      // 挿入した文字の直後にカーソルをセット
      const newCursorPos = start + insertText.length;
      input.setSelectionRange(newCursorPos, newCursorPos);
    }

    function copyToClipboard() {
      const msgSpan = document.getElementById('copy-message');
      navigator.clipboard.writeText(output.textContent).then(() => {
        // メッセージを表示
        msgSpan.style.display = "inline-block";
        // 2秒（2000ミリ秒）後にメッセージを消す
        setTimeout(() => { msgSpan.style.display = "none"; }, 2000);
      });
    }

    function openPreview() {
      const markdownHTML = marked.parse(input.value);
      const userCSS = cssInput.value;
      let fullHTML = wrapperInput.value;
      // プレースホルダーの置換
      fullHTML = fullHTML.replaceAll('{{css}}', userCSS);
      fullHTML = fullHTML.replaceAll('{{content}}', markdownHTML);
      const previewWin = window.open('', 'previewWin', 'width=800,height=600');
      previewWin.document.write(fullHTML);
      previewWin.document.close();
    }


    function changeIndent(action) {
      const input = document.getElementById('markdown-input');
      const start = input.selectionStart;
      const end = input.selectionEnd;
      const value = input.value;

      // 1. カーソルがある位置の「行の始まり」と「行の終わり」を特定する
      const lineStart = value.lastIndexOf('\n', start - 1) + 1;
      let lineEnd = value.indexOf('\n', end);
      if (lineEnd === -1) lineEnd = value.length;

      // 2. ターゲットになる行（または複数行）を抜き出す
      const targetText = value.substring(lineStart, lineEnd);
      const lines = targetText.split('\n');

      // 3. 各行に対してインデントの追加・削除をおこなう
      const processedLines = lines.map(line => {
        if (action === 'add') {
          // 💡 ➡️ ボタン：行頭に半角スペースを4個足す
          return '    ' + line;
        } else if (action === 'remove') {
          // 💡 ⬅️ ボタン：行頭にスペースがあれば、最大4個までスマートに削る
          return line.replace(/^ {1,4}/, '');
        }
        return line;
      });

      const newText = processedLines.join('\n');

      // 4. テキストエリアの中身を書き換える
      input.value = value.substring(0, lineStart) + newText + value.substring(lineEnd);

      // プレビューをリアルタイム更新
      updateOutput();

      // 5. フォーカスとカーソル位置を調整
      input.focus();
      const diff = newText.length - targetText.length;
      // カーソル位置をいい感じに補正して戻す
      input.setSelectionRange(start + (action === 'add' ? 4 : (diff < 0 ? diff : 0)), end + diff);
    }
  </script>
  <footer id="footer">
    <div class="footer-links">
      <a href="https://sasasakaz.github.io/utility/" target="_blank">🏠 View Other Tools</a>
      <span class="separator">|</span>
      <a href="https://github.com/sasasakaz/utility/blob/main/pages/markdown_converter.html" target="_blank">View source
        on GitHub</a>
    </div>
    <p>Coded by sasasakaz 2022-2026</p>
  </footer>
</body>

</html>
