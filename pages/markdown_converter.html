<html lang="ja">

Note: ペースト先のhtmlにhighlight.jsの追記と、cssの追加が必要。
-->

<head>
    <meta charset="UTF-8">
    <title>Markdown to HTML</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* このツール自体のレイアウト用CSS */
        body {
            font-family: sans-serif;
            margin: 20px;
            background: #f4f4f4;
            color: #333;
        }

        .container {
            display: flex;
            gap: 20px;
            height: 75vh;
        }

        textarea,
        .output {
            flex: 1;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: white;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 14px;
        }

        .controls {
            margin-bottom: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-group {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .copy-msg {
            color: #4caf50;
            font-weight: bold;
            margin-left: 10px;
            align-self: center;
            display: inline-block;  /* 文字が入っていない時に余計なスペースを取らないように */
            min-width: 120px;
        }


        button {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        /* 共通のボタンスタイル */
        .btn-tag {
            background: #fff;
            border: 1px solid #ddd;
            color: #555;
            /* 左側に少し太めの線を入れて、色分けの目印にする */
            border-left-width: 5px;
        }

        /* Markdown形式のボタン（控えめなグレー） */
        .btn-md {
            border-left-color: #ccc;
        }

        /* HTML形式のボタン（鮮やかなブルー） */
        .btn-html {
            border-left-color: #0288d1;
        }

        .btn-tag:hover {
            background: #f8f8f8;
            border-color: #bbb;
        }

        .btn-copy {
            background: #f57c00;
            color: white;
        }

        .btn-preview {
            background: #0288d1;
            color: white;
        }

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <h2>MarkdownをHTMLに変換するにゃん</h2>

    <div class="controls">
        <button class="btn-tag btn-md" onclick="insertTag('strong')" title="Markdown形式で挿入">🅱️ 強調</button>
        <button class="btn-tag btn-md" onclick="insertTag('link')" title="Markdown形式で挿入">🔗 リンク</button>
        <button class="btn-tag btn-md" onclick="insertTag('quote')" title="Markdown形式で挿入">❝ 引用 ❞</button>
        <button class="btn-tag btn-md" onclick="insertTag('table')" title="Markdown形式で挿入">📊 表</button>
        <button class="btn-tag btn-md" onclick="insertTag('inline_code')" title="Markdown形式で挿入">🏷️ インラインコード</button>
        <button class="btn-tag btn-md" onclick="insertTag('code')" title="Markdown形式で挿入">🧱 コードブロック</button>
        <!-- <span style="margin: 0 5px; border-left: 1px solid #ccc;"></span> -->
        <button class="btn-tag btn-html" onclick="insertTag('mark')" title="HTML形式で挿入">🖍️ ハイライト</button>
        <button class="btn-tag btn-html" onclick="insertTag('info')" title="HTML形式で挿入">✅ 情報</button>
        <button class="btn-tag btn-html" onclick="insertTag('warn')" title="HTML形式で挿入">⚠️ 注意</button>
        <button class="btn-tag btn-html" onclick="insertTag('alert')" title="HTML形式で挿入">🚫 危険</button>
        <button class="btn-tag btn-html" onclick="insertTag('br_hr')" title="HTML形式で挿入">➖ 改行&区切り線</button>
    </div>

    <div class="container">
        <textarea id="markdown-input" placeholder="Input Markdown..."></textarea>
        <div id="html-output" class="output"></div>
    </div>

    <div class="btn-group">
        <button class="btn-preview" onclick="openPreview()">Preview HTML</button>
        <button class="btn-copy" onclick="copyToClipboard()">Copy HTML source</button>
        <span id="copy-message" class="copy-msg" style="display: none;">コピーしたにゃん！</span>
    </div>

    <script>
        // プレビュー用CSS
        const commonCSS = `
            body { font-family: sans-serif; line-height: 1.6; padding: 40px; max-width: 750px; margin: auto; background: white; color: #333; }
            blockquote { border-left: 5px solid #ccc; margin: 1.5em 20px; padding: 10px 20px; color: #666;background-color: #f9f9f9; }
            mark { background-color: #fff176; }
            :not(pre) > code {
                background-color: #f0f0f0;
                color: #c7254e;
                padding: 2px 4px;
                border-radius: 4px;
                font-family: monospace;
                font-size: 90%;
            }
            .mdc-info-box {
                background-color: #e8f5e9;
                border-left: 5px solid #4caf50;
                padding: 15px;
                margin: 10px 0;
                border-radius: 4px;
            }
            .mdc-warn-box {
                background-color: #fff3e0;
                border-left: 5px solid #ff9800;
                padding: 15px;
                margin: 10px 0;
                border-radius: 4px;
            }
            .mdc-alert-box {
                background-color: #ffebee;
                border-left: 5px solid #f44336;
                padding: 15px;
                margin: 10px 0;
                border-radius: 4px;
            }
            `;

        const input = document.getElementById('markdown-input');
        const output = document.getElementById('html-output');

        // リアルタイム更新
        input.addEventListener('input', updateOutput);
        function updateOutput() {
            // 右側にはHTMLソースを文字列として表示する
            output.textContent = marked.parse(input.value);
        }

        // ボタン押下時のタグ挿入関数
        function insertTag(type) {
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const currentText = input.value;
            const selectedText = currentText.substring(start, end);

            let insertText = "";
            switch (type) {
                case 'strong':
                    insertText = '**' + (selectedText || '強調') + '**';
                    break;
                case 'link':
                    insertText = '[' + (selectedText || 'テキスト') + '](https://google.com)';
                    break;
                case 'quote':
                    insertText = '\n> ' + (selectedText || '引用文') + '\n';
                    break;
                case 'table':
                    insertText = '| Header | Header | Header |\n| :--- | :--- | :--- |\n| Cell | Cell | Cell |\n| Cell | Cell | Cell |\n';
                    break;
                case 'inline_code':
                    insertText = '`' + (selectedText || 'code') + '`';
                    break;
                case 'code':
                    insertText = '\n```\n' + (selectedText || 'code here') + '\n```\n';
                    break;
                case 'mark':
                    insertText = '<mark>' + (selectedText || 'ハイライト') + '</mark>';
                    break;
                case 'info':
                    insertText = '<div class="mdc-info-box">\n<strong>✅ 情報</strong>\n<ul>\n  <li>' + (selectedText || 'ないようを入力') + '</li>\n</ul>\n</div>\n';
                    break;
                case 'warn':
                    insertText = '<div class="mdc-warn-box">\n<strong>⚠️ 注意</strong>\n<ul>\n  <li>' + (selectedText || 'ないようを入力') + '</li>\n</ul>\n</div>\n';
                    break;
                case 'alert':
                    insertText = '<div class="mdc-alert-box">\n<strong>🚫 危険！</strong>\n<ul>\n  <li>' + (selectedText || 'ないようを入力') + '</li>\n</ul>\n</div>\n';
                    break;
                case 'br_hr':
                    insertText = '\n<br>\n<hr>\n<br>\n';
                    break;
                    // case 'code':
                //     insertText = '<pre><code>\n' + (selectedText || 'code here') + '\n</code></pre>\n';
                //     break;
            }

            // 選択範囲を新しい文字列で置き換える
            input.value = currentText.substring(0, start) + insertText + currentText.substring(end);
            // プレビュー更新
            updateOutput();
            // フォーカスを戻す
            input.focus();
            // 挿入した文字の直後にカーソルをセット
            const newCursorPos = start + insertText.length;
            input.setSelectionRange(newCursorPos, newCursorPos);
        }

        function copyToClipboard() {
            const msgSpan = document.getElementById('copy-message');

            navigator.clipboard.writeText(output.textContent).then(() => {
                // メッセージを表示
                msgSpan.style.display = "inline-block";

                // 2秒（2000ミリ秒）後にメッセージを消す
                setTimeout(() => {
                    msgSpan.style.display = "none";
                }, 2000);
            }).catch(err => {
                console.error('コピーに失敗したにゃん...: ', err);
            });
        }

        function openPreview() {
            const htmlContent = marked.parse(input.value);
            const previewWin = window.open('', 'previewWin', 'width=800,height=600');

            // document.write で中身を組み立てる
            previewWin.document.write('<html><head><title>HTML Preview</title>');
            previewWin.document.write('<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">');
            previewWin.document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"><\/script>');
            previewWin.document.write('<style>' + commonCSS + '</style></head><body>');
            previewWin.document.write(htmlContent);
            previewWin.document.write('<script>hljs.highlightAll();<\/script></body></html>');

            previewWin.document.close();
        }
    </script>
</body>

</html>
